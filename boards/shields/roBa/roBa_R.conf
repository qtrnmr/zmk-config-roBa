CONFIG_ZMK_KEYBOARD_NAME="roBa"

CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y



CONFIG_SPI=y
CONFIG_INPUT=y

CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=400
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_0=y
# CONFIG_PMW3610_SNIPE_CPI=800
# CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=4
CONFIG_PMW3610_SCROLL_TICK=16
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
#CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=9600
#CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=
#CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=
#CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=
#CONFIG_PMW3610_REST3_DOWNSHIFT_TIME_MS=
CONFIG_PMW3610_FORCE_AWAKE=y
CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=200

CONFIG_PMW3610_MOVEMENT_THRESHOLD=0

CONFIG_PMW3610_SMART_ALGORITHM=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_TRANSPORT_BLE=y

# runtime macro module (SP1)
CONFIG_ZMK_RUNTIME_MACRO=y
CONFIG_ZMK_RUNTIME_MACRO_STUDIO_RPC=y

# Enlarge Studio RPC buffers for worst-case 32-step macro payloads.
# A 32-step macro of modifier+key+wait steps serializes to ~357 bytes of
# macros.Request payload; the wrapping studio.Request (custom envelope + COBS
# framing) reaches ~600 bytes on the wire.
# GetMacro response for a full 32-step slot is ~357 bytes; the response buffer
# is sized by the zmk_macros_Response struct in the firmware (no separate
# Kconfig was found in the cormoran fork — response-side truncation will be
# caught by the controller's full-32-step HIL test).
# nRF52840 has 256 KB RAM; these increases are cheap.
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=1024
CONFIG_ZMK_STUDIO_RPC_CUSTOM_SUBSYSTEM_REQUEST_PAYLOAD_MAX_BYTES=512

# runtime input processor module (W1b): trackball runtime config over cormoran_rip.
# overlay includes <zephyr/dt-bindings/input/input-event-codes.h> before the
# processors dtsi so INPUT_EV_REL resolves (root cause of the old dtsi:17 build
# failure). _STUDIO_RPC pulls the custom-RPC layer that this base already
# provides (proven by the SP1 runtime-macro module).
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR=y
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR_STUDIO_RPC=y

# runtime hold-tap timing module (W2a): edit tapping-term/flavor over zmk__holdtap
CONFIG_ZMK_RUNTIME_HOLDTAP=y
CONFIG_ZMK_RUNTIME_HOLDTAP_STUDIO_RPC=y

# runtime conditional layers module (W2b): edit if-layers/then-layer over zmk__condlayers
CONFIG_ZMK_RUNTIME_CONDLAYERS=y
CONFIG_ZMK_RUNTIME_CONDLAYERS_STUDIO_RPC=y

# runtime sensor-rotate module (W2c): edit encoder cw/ccw bindings over cormoran_rsr.
# Active sensor is the left encoder (index 0); revert = set behavior id 0 -> DT default.
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE=y
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE_STUDIO_RPC=y

# runtime combos module (W2d): edit existing combos' binding/timeout/layers/
# require-prior-idle/slow-release over zmk__combos (key-positions fixed).
CONFIG_ZMK_RUNTIME_COMBOS=y
CONFIG_ZMK_RUNTIME_COMBOS_STUDIO_RPC=y

# DYA Studio modules — disabled for USB Studio transport.
# studio-rpc-usb-uart snippet enables multi-endpoint Studio, which makes
# zmk-module-ble-management call zmk_endpoint_{get,set}_preferred_transport,
# absent in the pinned v0.3-branch+dya ZMK base (link error). These dya
# extras (ble-management / settings-rpc / battery-history) are the custom
# Studio-RPC layer and are not in use; disabling them yields a leaner,
# more standard ZMK Studio that the upstream zmk-studio-api can talk to.
# CONFIG_ZMK_SETTINGS_RPC=y
# CONFIG_ZMK_SETTINGS_RPC_STUDIO=y
# CONFIG_ZMK_BLE_MANAGEMENT=y
# CONFIG_ZMK_BLE_MANAGEMENT_STUDIO_RPC=y
# CONFIG_ZMK_BATTERY_HISTORY=y
# CONFIG_ZMK_BATTERY_HISTORY_STUDIO_RPC=y

