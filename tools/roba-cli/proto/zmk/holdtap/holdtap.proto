syntax = "proto3";

package zmk.holdtap;

// Timing for one runtime hold-tap slot. flavor is the enum flavor index
// (0=hold-preferred, 1=balanced, 2=tap-preferred, 3=tap-unless-interrupted).
message HoldTapInfo {
    uint32 slot                  = 1;
    int32  tapping_term_ms       = 2;
    int32  quick_tap_ms          = 3;
    int32  require_prior_idle_ms = 4;
    uint32 flavor                = 5;
    bool   found                 = 6;
}

message Empty {}

message SlotRequest {
    uint32 slot = 1;
}

message SetRequest {
    uint32 slot                  = 1;
    int32  tapping_term_ms       = 2;
    int32  quick_tap_ms          = 3;
    int32  require_prior_idle_ms = 4;
    uint32 flavor                = 5;
}

message CountResponse {
    uint32 count = 1; // number of registered runtime hold-tap slots (0..count-1)
}

message OkResponse {
    bool   ok    = 1;
    uint32 error = 2;
}

message Request {
    oneof request_type {
        Empty       count = 1;
        SlotRequest get   = 2;
        SetRequest  set   = 3;
        SlotRequest reset = 4;
    }
}

message Response {
    oneof response_type {
        CountResponse count = 1;
        HoldTapInfo   get   = 2;
        OkResponse    set   = 3;
        OkResponse    reset = 4;
    }
}
