syntax = "proto3";

package zmk.macros;

message MacroStep {
    uint32 type    = 1;
    uint32 keycode = 2;
    uint32 wait_ms = 3;
    uint32 tap_ms  = 4;
}

message GetMacroRequest {
    uint32 slot = 1;
}

message GetMacroResponse {
    repeated MacroStep steps = 1;
}

message SetMacroRequest {
    uint32 slot = 1;
    repeated MacroStep steps = 2;
}

message SetMacroResponse {
    bool   ok    = 1;
    uint32 error = 2;
}

message Request {
    oneof request_type {
        GetMacroRequest get_macro = 1;
        SetMacroRequest set_macro = 2;
    }
}

message Response {
    oneof response_type {
        GetMacroResponse get_macro = 1;
        SetMacroResponse set_macro = 2;
    }
}
