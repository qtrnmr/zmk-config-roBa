syntax = "proto3";

package zmk.combos;

message Binding {
    uint32 behavior_id = 1;   // zmk_behavior_local_id_t
    uint32 param1 = 2;
    uint32 param2 = 3;
}

message ComboInfo {
    uint32 index = 1;
    repeated uint32 key_positions = 2;   // read-only
    Binding binding = 3;
    int32 timeout_ms = 4;
    int32 require_prior_idle_ms = 5;
    uint32 layer_mask = 6;
    bool slow_release = 7;
    bool found = 8;
}

message CountRequest {}
message CountResponse { uint32 count = 1; }

message GetRequest { uint32 index = 1; }
message GetResponse { ComboInfo info = 1; }

message SetRequest {
    uint32 index = 1;
    oneof field {
        Binding binding = 2;
        int32 timeout_ms = 3;
        int32 require_prior_idle_ms = 4;
        uint32 layer_mask = 5;
        bool slow_release = 6;
    }
}
message SetResponse { bool ok = 1; }

message ResetRequest { uint32 index = 1; }
message ResetResponse { bool ok = 1; }

message Request {
    oneof request_type {
        CountRequest count = 1;
        GetRequest get = 2;
        SetRequest set = 3;
        ResetRequest reset = 4;
    }
}
message Response {
    oneof response_type {
        CountResponse count = 1;
        GetResponse get = 2;
        SetResponse set = 3;
        ResetResponse reset = 4;
    }
}
