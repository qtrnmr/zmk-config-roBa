syntax = "proto3";

package zmk.condlayers;

// One conditional-layer entry. if_layers_mask is a bitmask of layer indices;
// then_layer activates when all those layers are active.
message CondLayerInfo {
    uint32 index           = 1;
    uint32 if_layers_mask  = 2;
    int32  then_layer      = 3;
    bool   found           = 4;
}

message Empty {}

message SlotRequest {
    uint32 index = 1;
}

message SetRequest {
    uint32 index           = 1;
    uint32 if_layers_mask  = 2;
    int32  then_layer      = 3;
}

message CountResponse {
    uint32 count = 1;
}

message OkResponse {
    bool   ok    = 1;
    uint32 error = 2;
}

message Request {
    oneof request_type {
        Empty       count = 1;
        SlotRequest get   = 2;
        SetRequest  set   = 3;
        SlotRequest reset = 4;
    }
}

message Response {
    oneof response_type {
        CountResponse count = 1;
        CondLayerInfo get   = 2;
        OkResponse    set   = 3;
        OkResponse    reset = 4;
    }
}
